<div id="spa-view-content">
  <div id="group-purchases" class="content-section active">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">
                    <i class="bi bi-people"></i> Compras Grupales
                </h2>
                <button class="btn btn-primary" onclick="showCreateGroupPurchaseModal()">
                    <i class="bi bi-plus"></i> Nueva Compra Grupal
                </button>
            </div>

            <!-- Filters -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">Estado</label>
                            <select class="form-select" id="groupPurchaseStatusFilter">
                                <option value="">Todos</option>
                                <option value="PENDING">Pendiente</option>
                                <option value="PARTIAL">Parcial</option>
                                <option value="COMPLETED">Completada</option>
                                <option value="CANCELLED">Cancelada</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Fecha Desde</label>
                            <input type="date" class="form-control" id="groupPurchaseStartDateFilter">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Fecha Hasta</label>
                            <input type="date" class="form-control" id="groupPurchaseEndDateFilter">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">&nbsp;</label>
                            <button class="btn btn-primary w-100" onclick="filterGroupPurchases()">
                                <i class="bi bi-funnel"></i> Filtrar
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Group Purchases Table -->
            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover" id="groupPurchasesTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Producto</th>
                                    <th>Total</th>
                                    <th>Participantes</th>
                                    <th>Estado</th>
                                    <th>Fecha</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="7" class="text-center text-muted">
                                        Cargando compras grupales...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
  <script>
    if (typeof loadGroupPurchases === 'function') loadGroupPurchases();
    window.initGroupPurchasesView = function() { if (typeof loadGroupPurchases === 'function') loadGroupPurchases(); };
  </script>
</div>
