<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOCOBAR – Login A</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:#060b0b;
  padding:24px;position:relative;overflow:hidden;
}
.bg{
  position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 55% at 18% 15%,rgba(13,148,136,.15) 0%,transparent 60%),
    radial-gradient(ellipse 50% 45% at 82% 85%,rgba(45,212,191,.07) 0%,transparent 55%),
    radial-gradient(ellipse 30% 28% at 75% 10%,rgba(217,119,6,.07) 0%,transparent 50%);
}
.grid{
  position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(13,148,136,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(13,148,136,.035) 1px,transparent 1px);
  background-size:32px 32px;
}
.card{
  position:relative;z-index:1;width:100%;max-width:400px;
  background:#0e1a1a;border:1px solid rgba(13,148,136,.2);
  border-radius:22px;overflow:hidden;
  box-shadow:0 0 0 1px rgba(13,148,136,.06),0 24px 64px rgba(0,0,0,.6);
  animation:up .5s ease both;
}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

.card-line{height:2px;background:linear-gradient(90deg,transparent,#0d9488 25%,#2dd4bf 55%,rgba(217,119,6,.5) 80%,transparent);}

.logo-area{
  padding:26px 28px 0;
  display:flex;flex-direction:column;align-items:center;
}
.drink{
  width:90px;height:90px;
  object-fit:contain;
  margin-bottom:12px;
  filter:drop-shadow(0 6px 16px rgba(13,148,136,.2)) drop-shadow(0 2px 10px rgba(217,119,6,.25));
  transition:transform .3s;
}
.drink:hover{transform:scale(1.04) rotate(-1deg);}
.brand-row{display:flex;align-items:center;gap:0;margin-bottom:4px;}
.brand{font-size:22px;font-weight:800;letter-spacing:.14em;color:#e8f5f5;line-height:1;}
.bacc{color:#2dd4bf;}
.bdot{width:5px;height:5px;border-radius:50%;background:#d97706;margin:0 3px;box-shadow:0 0 8px rgba(217,119,6,.55);}
.tag{font-size:12px;color:#2e5555;letter-spacing:.04em;margin-bottom:20px;}
.ldiv{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(13,148,136,.18),rgba(217,119,6,.12),transparent);}

.fbody{padding:22px 28px 24px;}
.fgroup{margin-bottom:14px;}
.lbl{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#4a8585;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;}
.iw{position:relative;display:flex;align-items:center;}
.ico{position:absolute;left:12px;color:#1e4040;pointer-events:none;display:flex;align-items:center;}
input[type=email],input[type=password],input[type=text]{
  width:100%;background:rgba(6,11,11,.75);border:1px solid rgba(13,148,136,.14);
  border-radius:10px;padding:11px 13px 11px 38px;
  font-size:13.5px;font-family:'Outfit',sans-serif;color:#e8f5f5;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
input::placeholder{color:#193535;}
input:focus{border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,.1);}
.eye{position:absolute;right:10px;background:none;border:none;cursor:pointer;color:#1e4040;padding:4px;display:flex;align-items:center;transition:color .15s;border-radius:5px;}
.eye:hover{color:#4a8585;}
.opts{display:flex;align-items:center;justify-content:space-between;margin-top:10px;margin-bottom:2px;}
.rem{display:flex;align-items:center;gap:6px;font-size:12px;color:#3a7070;cursor:pointer;}
.rem input{width:13px;height:13px;padding:0;accent-color:#0d9488;cursor:pointer;}
.fgt{font-size:12px;font-weight:600;color:#0d9488;background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;transition:color .15s;}
.fgt:hover{color:#2dd4bf;}
.sub{
  width:100%;margin-top:20px;padding:12px 16px;border-radius:10px;
  background:linear-gradient(135deg,#0a7870,#0d9488 40%,#2dd4bf);
  color:#030d0d;font-size:14px;font-weight:800;font-family:'Outfit',sans-serif;
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  letter-spacing:.03em;
  box-shadow:0 4px 18px rgba(13,148,136,.35),0 0 0 1px rgba(45,212,191,.15);
  transition:all .2s;position:relative;overflow:hidden;
}
.sub::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(217,119,6,.1) 100%);opacity:0;transition:opacity .2s;}
.sub:hover::after{opacity:1;}
.sub:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(13,148,136,.45);}
.sub:active{transform:translateY(0);}

.cfoot{padding:12px 28px 16px;border-top:1px solid rgba(13,148,136,.08);display:flex;align-items:center;justify-content:space-between;}
.reg{font-size:12.5px;color:#2e5555;}
.reg a{color:#2dd4bf;font-weight:700;text-decoration:none;transition:color .15s;}
.reg a:hover{color:#5eead4;}
.copy{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#132525;}
</style>
</head>
