<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOCOBAR – Mi Crédito</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
[data-theme="dark"] {
  --bg:        #0a0f0f;
  --surf:      #131f1f;
  --surf2:     #192828;
  --surf3:     #1e3030;
  --border:    rgba(45,212,191,.1);
  --border2:   rgba(45,212,191,.26);
  --text:      #e8f5f5;
  --text2:     #6b9e9e;
  --text3:     #334e4e;
  --accent:    #0d9488;
  --accent2:   #2dd4bf;
  --accentbg:  rgba(13,148,136,.1);
  --green:     #34d399; --gbg: rgba(52,211,153,.1);
  --red:       #fb7185; --rbg: rgba(251,113,133,.09);
  --amber:     #fbbf24; --ambg: rgba(251,191,36,.09);
  --hdr:       #080e0e;
  --hborder:   rgba(45,212,191,.11);
  --dash:      rgba(45,212,191,.14);
  --card-sh:   0 4px 20px rgba(0,0,0,.5), 0 0 0 1px rgba(45,212,191,.1);
  --card-sh-h: 0 6px 28px rgba(0,0,0,.55), 0 0 0 1px rgba(45,212,191,.22);
}
[data-theme="light"] {
  --bg:        #dde8e8;
  --surf:      #ffffff;
  --surf2:     #f3f9f9;
  --surf3:     #e8f3f3;
  --border:    rgba(13,148,136,.13);
  --border2:   rgba(13,148,136,.32);
  --text:      #0f2020;
  --text2:     #3a7070;
  --text3:     #8ab8b8;
  --accent:    #0d9488;
  --accent2:   #0a7870;
  --accentbg:  rgba(13,148,136,.07);
  --green:     #059669; --gbg: rgba(5,150,105,.08);
  --red:       #e11d48; --rbg: rgba(225,29,72,.08);
  --amber:     #d97706; --ambg: rgba(217,119,6,.08);
  --hdr:       #ffffff;
  --hborder:   rgba(13,148,136,.12);
  --dash:      rgba(13,148,136,.16);
  --card-sh:   0 2px 12px rgba(13,148,136,.1), 0 0 0 1px rgba(13,148,136,.08);
  --card-sh-h: 0 6px 22px rgba(13,148,136,.18), 0 0 0 1px rgba(13,148,136,.2);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(13,148,136,.016) 1px,transparent 1px),linear-gradient(90deg,rgba(13,148,136,.016) 1px,transparent 1px);
  background-size:36px 36px;}

/* TOPBAR */
.topbar{background:var(--hdr);border-bottom:1px solid var(--hborder);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.25);transition:background .3s;}
.logo-icon{height:32px;object-fit:contain;display:none;}
.logo-banner{height:26px;object-fit:contain;}
@media(max-width:460px){.logo-icon{display:block;}.logo-banner{display:none;}}
.topbar-right{display:flex;align-items:center;gap:9px;}
.theme-toggle{display:flex;gap:2px;background:var(--surf2);border:1px solid var(--border);border-radius:20px;padding:3px;}
.th-opt{padding:4px 9px;border-radius:16px;font-size:11px;font-weight:700;color:var(--text3);border:none;background:transparent;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .2s;}
.th-opt.active{background:var(--accent);color:#fff;}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;}
.user-av{width:20px;height:20px;border-radius:5px;background:var(--accentbg);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--accent);flex-shrink:0;}
.uname{display:inline;}
@media(max-width:500px){.uname{display:none;}}

/* PAGE */
.page{max-width:860px;margin:0 auto;padding:24px 16px 60px;position:relative;z-index:1;}

/* PAGE HEADER */
.page-hdr{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.pticon{width:38px;height:38px;border-radius:11px;background:var(--accentbg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--accent2);flex-shrink:0;}
.page-hdr h1{font-size:20px;font-weight:800;color:var(--text);}

/* SUMMARY HERO */
.hero{
  background:var(--surf);
  border:1px solid var(--border);
  border-radius:16px;
  box-shadow:var(--card-sh);
  overflow:hidden;
  margin-bottom:16px;
  position:relative;
}
.hero-head{
  background:rgba(13,148,136,.1);
  border-bottom:1.5px dashed var(--dash);
  padding:12px 18px;
  display:flex;align-items:center;gap:8px;
}
.hero-head-title{font-size:12px;font-weight:800;color:var(--text);letter-spacing:.04em;text-transform:uppercase;}
.hero-body{
  display:grid;grid-template-columns:repeat(3,1fr);
  padding:16px 18px;gap:8px;
}
@media(max-width:520px){.hero-body{grid-template-columns:1fr 1fr;}}
.hero-stat{}
.hero-stat-val{
  font-family:'JetBrains Mono',monospace;
  font-size:26px;font-weight:900;
  color:var(--accent2);line-height:1;margin-bottom:4px;
}
.hero-stat-val.red{color:var(--red);}
.hero-stat-val.amber{color:var(--amber);}
.hero-stat-lbl{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}

/* Divider between stats */
.hero-body .hero-stat:not(:last-child){
  border-right:1px dashed var(--dash);
  padding-right:18px;
}
.hero-body .hero-stat:not(:first-child){
  padding-left:18px;
}
@media(max-width:520px){
  .hero-body .hero-stat:not(:last-child){border-right:none;padding-right:0;}
  .hero-body .hero-stat:not(:first-child){padding-left:0;}
}

/* CREDIT CARDS */
.credits-list{display:flex;flex-direction:column;gap:12px;}

.credit-card{
  background:var(--surf);
  border:1px solid var(--border);
  border-radius:14px;
  box-shadow:var(--card-sh);
  overflow:hidden;
  transition:box-shadow .2s,border-color .2s,transform .15s;
  animation:cardIn .35s ease both;
}
.credit-card:hover{
  box-shadow:var(--card-sh-h);
  border-color:var(--border2);
  transform:translateY(-1px);
}
.credit-card.vencido{border-top:2px solid var(--red);}
.credit-card.vigente{border-top:2px solid var(--accent);}
.credit-card.sin-fecha{border-top:2px solid var(--amber);}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Card header */
.cc-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;
  border-bottom:1.5px dashed var(--dash);
  gap:10px;
}
.cc-head-left{display:flex;align-items:center;gap:7px;}
.cc-icon{
  width:26px;height:26px;border-radius:7px;
  background:var(--accentbg);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent2);flex-shrink:0;
}
.cc-title{font-size:12px;font-weight:800;color:var(--text);}
.cc-id{font-size:9.5px;color:var(--text3);font-family:'JetBrains Mono',monospace;}

/* Status badge */
.cc-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:20px;
  font-size:9px;font-weight:800;letter-spacing:.04em;
  white-space:nowrap;flex-shrink:0;
}
.cc-badge::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.badge-vencido{background:var(--rbg);color:var(--red);border:1px solid rgba(251,113,133,.2);}
.badge-vencido::before{background:var(--red);box-shadow:0 0 4px var(--red);}
.badge-vigente{background:var(--gbg);color:var(--green);border:1px solid rgba(52,211,153,.2);}
.badge-vigente::before{background:var(--green);box-shadow:0 0 4px var(--green);}
.badge-sin-fecha{background:var(--ambg);color:var(--amber);border:1px solid rgba(251,191,36,.2);}
.badge-sin-fecha::before{background:var(--amber);box-shadow:0 0 4px var(--amber);}

/* Card body — all fields in one horizontal row */
.cc-body{
  display:flex;align-items:center;
  padding:8px 14px;
}
.cc-field{
  display:flex;flex-direction:column;gap:1px;
  flex:1;min-width:80px;
}
.cc-field+.cc-field{border-left:1px dashed var(--dash);padding-left:12px;margin-left:12px;}
.cc-field-lbl{font-size:8.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);}
.cc-field-val{font-size:12px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace;}
.cc-field-val.accent{color:var(--accent2);}
.cc-field-val.red{color:var(--red);}

/* Alert row */
.cc-alert{
  margin:0 14px 6px;
  padding:5px 10px;border-radius:7px;
  background:var(--rbg);border:1px solid rgba(251,113,133,.2);
  font-size:10.5px;color:var(--text2);
  display:flex;align-items:center;gap:6px;
}
.cc-alert svg{color:var(--red);flex-shrink:0;}
.cc-alert strong{color:var(--red);}

/* Card footer */
.cc-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 14px 8px;gap:10px;
}
.cc-rate{
  display:flex;align-items:center;gap:4px;
  font-size:9.5px;color:var(--text3);
}

.pay-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),#0f766e);
  border:none;color:#fff;
  font-size:11.5px;font-weight:800;font-family:'Outfit',sans-serif;
  cursor:pointer;
  box-shadow:0 3px 10px rgba(13,148,136,.28);
  transition:opacity .15s,transform .12s,box-shadow .15s;
  white-space:nowrap;
}
.pay-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 5px 16px rgba(13,148,136,.4);}
.pay-btn:active{transform:scale(.97);}
</style>
</head>

  if(c.vencido) return 'Vencido';
  if(!c.fechaLimite) return 'Sin fecha límite';
  return 'Vigente';
}

function render(){
  const list = document.getElementById('creditsList');
  list.innerHTML = credits.map((c,i) => {
    const st = statusClass(c);
    return `
    <div class="credit-card ${st}" style="animation-delay:${i*.08}s">

      <div class="cc-head">
        <div class="cc-head-left">
          <div class="cc-icon">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          </div>
          <div>
            <div class="cc-title">Crédito</div>
            <div class="cc-id">${c.id}</div>
          </div>
        </div>
        <span class="cc-badge badge-${st}">${statusLabel(c)}</span>
      </div>

      <div class="cc-body">
        <div class="cc-field">
          <span class="cc-field-lbl">Monto inicial</span>
          <span class="cc-field-val">$${c.montoInicial.toFixed(2)}</span>
        </div>
        <div class="cc-field">
          <span class="cc-field-lbl">Saldo actual</span>
          <span class="cc-field-val accent">$${c.saldoActual.toFixed(2)}</span>
        </div>
        <div class="cc-field">
          <span class="cc-field-lbl">Intereses acumulados</span>
          <span class="cc-field-val ${c.intereses>0?'red':''}">$${c.intereses.toFixed(2)}</span>
        </div>
        <div class="cc-field">
          <span class="cc-field-lbl">Fecha límite</span>
          <span class="cc-field-val ${c.vencido?'red':''}">${c.fechaLimite || 'Sin fecha límite'}</span>
        </div>
      </div>

      ${c.vencido ? `
      <div class="cc-alert">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span><strong>Esta deuda está vencida.</strong> Los intereses continúan acumulándose hasta que se pague.</span>
      </div>` : ''}

      <div class="cc-footer">
        <div class="cc-rate">
          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Tasa de interés: ${c.tasa.toFixed(2)}% diario
        </div>
        <button class="pay-btn" onclick="pagar('${c.id}')">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          Pagar Ahora
        </button>
      </div>

    </div>`;
  }).join('');
}

function pagar(id){
  alert('Redirigiendo al pago de ' + id);
}

render();
</script>
</body>
</html>
